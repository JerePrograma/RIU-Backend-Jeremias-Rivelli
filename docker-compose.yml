version: "3.9"

services:
  oracle:
    image: gvenzl/oracle-free:${ORACLE_IMAGE_TAG:-23-slim}
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle_local_change_me_2026}
      APP_USER: ${APP_USER:-hotel_app}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-hotel_app_local_change_me_2026}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - hotel-net

  kafka:
    image: bitnami/kafka:${KAFKA_IMAGE_TAG:-4.2}
    environment:
      KAFKA_CFG_NODE_ID: ${KAFKA_NODE_ID:-0}
      KAFKA_CFG_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES:-controller,broker}
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS:-0@kafka:9093}

      KAFKA_CFG_LISTENERS: ${KAFKA_LISTENERS:-PLAINTEXT://:9092,CONTROLLER://:9093}
      KAFKA_CFG_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT}
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES:-CONTROLLER}

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}
      KAFKA_CFG_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-1}
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - hotel-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}

      DB_URL: ${DB_URL:-jdbc:oracle:thin:@oracle:1521/FREEPDB1}
      DB_USERNAME: ${DB_USERNAME:-hotel_app}
      DB_PASSWORD: ${DB_PASSWORD:-hotel_app_local_change_me_2026}
      DB_DRIVER: ${DB_DRIVER:-oracle.jdbc.OracleDriver}

      SQL_INIT_MODE: ${SQL_INIT_MODE:-always}
      SQL_INIT_SCHEMA: ${SQL_INIT_SCHEMA:-classpath:db/schema.sql}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-hotel-search-group}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
      KAFKA_TRUSTED_PACKAGES: ${KAFKA_TRUSTED_PACKAGES:-com.riu.hotelsearch.*}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - hotel-net

volumes:
  oracle-data:
  kafka-data:

networks:
  hotel-net:
    driver: bridge