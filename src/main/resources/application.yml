server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: hotel-search

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle:1521/FREEPDB1}
    username: ${DB_USERNAME:hotel_app}
    password: ${DB_PASSWORD:hotel_app}
    driver-class-name: ${DB_DRIVER:oracle.jdbc.OracleDriver}

  sql:
    init:
      mode: always
      schema-locations: classpath:db/V1__initial_schema.sql

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:hotel-search-group}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ${KAFKA_TRUSTED_PACKAGES:com.riu.hotelsearch.*}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        linger.ms: 5

  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  kafka:
    topic: ${APP_KAFKA_TOPIC:hotel_availability_searches}
    partitions: ${APP_KAFKA_PARTITIONS:4}
    replication-factor: ${APP_KAFKA_REPLICATION_FACTOR:1}
    listener-concurrency: ${APP_KAFKA_LISTENER_CONCURRENCY:4}