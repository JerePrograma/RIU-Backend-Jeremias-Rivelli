services:
  oracle:
    image: gvenzl/oracle-free:${ORACLE_IMAGE_TAG:-23-slim-faststart}
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle_local_change_me_2026}
      APP_USER: ${APP_USER:-hotel_app}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-hotel_app_local_change_me_2026}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh >/dev/null || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 8m
    networks:
      - hotel-net

  kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG:-4.2.0}
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - hotel-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:oracle:thin:@oracle:1521/FREEPDB1
      DB_USERNAME: hotel_app
      DB_PASSWORD: hotel_app_local_change_me_2026
      DB_DRIVER: oracle.jdbc.OracleDriver
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP_ID: hotel-search-group
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_TRUSTED_PACKAGES: com.riu.hotelsearch.*
    ports:
      - "8080:8080"
    networks:
      - hotel-net

volumes:
  oracle-data:
  kafka-data:

networks:
  hotel-net:
    driver: bridge